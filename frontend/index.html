<!DOCTYPE html>
<html lang="fr">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>VibeSport - Ton Coach IA</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
	<style>
        body { background-color: #f8f9fa; }
        .hero-section { background: linear-gradient(135deg, #0d6efd, #0dcaf0); color: white; padding: 2rem 0; border-radius: 0 0 20px 20px; margin-bottom: 2rem; }
        .exercise-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); transition: 0.2s; }
        .sports-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
	</style>
</head>
<body>

<div class="hero-section text-center">
	<h1 class="display-5 fw-bold">VibeSport Coach</h1>
	<p class="lead" id="headerSubtitle">L'IA au service de votre condition physique.</p>
</div>

<div class="container mb-5">

	<div id="onboardingScreen" class="row justify-content-center">
		<div class="col-md-8">
			<div class="card shadow">
				<div class="card-header bg-primary text-white">
					<h4 class="mb-0">👋 Bienvenue ! Créez votre profil</h4>
				</div>
				<div class="card-body">
					<form id="onboardingForm">
						<div class="mb-3">
							<label for="username" class="form-label fw-bold">Nom d'utilisateur (Identifiant unique)</label>
							<input type="text" class="form-control" id="username" required placeholder="Ex: julie_sportive">
						</div>
						<div class="mb-3">
							<label for="fitnessLevel" class="form-label fw-bold">Niveau sportif</label>
							<select class="form-select" id="fitnessLevel">
								<option value="Débutant">Débutant</option>
								<option value="Intermédiaire" selected>Intermédiaire</option>
								<option value="Avancé">Avancé</option>
							</select>
						</div>
						<div class="mb-4">
							<label class="form-label fw-bold">Sélectionnez vos sports favoris (Max 3)</label>
							<div class="sports-grid" id="sportsContainer">
							</div>
							<small class="text-danger d-none" id="sportsError">Choisissez entre 1 et 3 sports.</small>
						</div>
						<button type="submit" class="btn btn-primary w-100 btn-lg">Créer mon profil</button>
					</form>
				</div>
			</div>
		</div>
	</div>

	<div id="dashboardScreen" class="d-none">

		<div class="d-flex justify-content-between align-items-center mb-4">
			<h2 id="welcomeMessage">Bonjour !</h2>
			<div>
				<button class="btn btn-outline-secondary me-2" id="btnHistory">📜 Mon Historique</button>
			</div>
		</div>

		<div class="card shadow-sm mb-5 border-info">
			<div class="card-header bg-info text-white">
				<h5 class="mb-0">⚡ Générer ma séance du jour</h5>
			</div>
			<div class="card-body">
				<form id="workoutForm">
					<div class="row">
						<div class="col-md-3 mb-3">
							<label for="energyLevel" class="form-label">Énergie (1 à 10)</label>
							<input type="number" class="form-control" id="energyLevel" min="1" max="10" value="7" required>
						</div>
						<div class="col-md-3 mb-3">
							<label for="availableTime" class="form-label">Temps (min)</label>
							<input type="number" class="form-control" id="availableTime" min="10" max="120" value="30" required>
						</div>
						<div class="col-md-3 mb-3">
							<label for="targetZone" class="form-label">Zone à cibler</label>
							<select class="form-select" id="targetZone">
								<option value="Tout le corps">Tout le corps</option>
								<option value="Haut du corps">Haut du corps</option>
								<option value="Bas du corps">Bas du corps</option>
								<option value="Gainage">Gainage</option>
								<option value="Mobilité">Mobilité</option>
							</select>
						</div>
						<div class="col-md-3 mb-3">
							<label for="equipment" class="form-label">Matériel</label>
							<select class="form-select" id="equipment">
								<option value="Aucun (Poids du corps)" selected>Aucun (Poids du corps)</option>
								<option value="Haltères ou Kettlebell">Haltères / Kettlebell</option>
								<option value="Barre de traction">Barre de traction</option>
								<option value="Élastiques">Élastiques</option>
								<option value="Salle de sport complète">Salle de sport complète</option>
							</select>
						</div>
					</div>
					<div class="mb-3">
						<label for="additionalNotes" class="form-label">Envie spécifique (Optionnel)</label>
						<input type="text" class="form-control" id="additionalNotes" placeholder="Ex: J'ai des courbatures aux cuisses...">
					</div>
					<button type="submit" class="btn btn-primary w-100" id="generateBtn">🚀 Générer ma séance IA</button>
				</form>
			</div>
		</div>

		<div id="loadingZone" class="text-center d-none my-5">
			<div class="spinner-border text-primary" style="width: 3rem; height: 3rem;"></div>
			<h4 class="mt-3">Création de la séance en cours...</h4>
		</div>

		<div id="displayZone"></div>

	</div>
</div>

<script src="app.js"></script>
</body>
</html>
